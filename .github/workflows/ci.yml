name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: git diff --check
      - run: npm run lint
      - run: npm test
      - run: npm run typecheck
      - run: npm run smoke:webview
      - run: npm run compile

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run coverage

  extension-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:extension

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate

  package:
    needs: [quality, coverage, extension-host, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare snapshot version
        id: snapshot
        shell: bash
        run: |
          version="$(node scripts/prepare-snapshot-version.mjs --run-number "$GITHUB_RUN_NUMBER")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Package and verify VSIX
        shell: bash
        env:
          SNAPSHOT_VERSION: ${{ steps.snapshot.outputs.version }}
        run: |
          set -euo pipefail
          npm run package
          short_sha="${GITHUB_SHA:0:12}"
          source_name="mindflow-canvas-editor-${SNAPSHOT_VERSION}.vsix"
          final_name="mindflow-canvas-editor-${SNAPSHOT_VERSION}-${short_sha}.vsix"
          test -f "$source_name"
          mkdir -p dist
          mv "$source_name" "dist/$final_name"
          node scripts/verify-vsix.mjs --vsix "dist/$final_name" --version "$SNAPSHOT_VERSION"
          (
            cd dist
            sha256sum "$final_name" > "$final_name.sha256"
          )
      - uses: actions/upload-artifact@v7
        with:
          name: mindflow-vsix
          path: dist/
          if-no-files-found: error
          retention-days: 14
